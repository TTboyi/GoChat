

[mainConfig]
appName = "gochat"
host = "127.0.0.1"
port = 8000

[mysqlConfig]
host = "127.0.0.1"
port = 3307
user = "root"
password = "123456"
databaseName = "gochat"

[redisConfig]
host = "127.0.0.1"
port = 6379
password = "123456"
db = 0

[authCodeConfig]
accessKeyID = "your accessKeyID in alibaba cloud"
accessKeySecret = "your accessKeySecret in alibaba cloud"
signName = "阿里云短信测试"
templateCode = "SMS_154950909"

[logConfig]
logPath = "your log path"

[kafkaConfig]
messageMode = "channel"
hostPort = "127.0.0.1:9092"
chatTopic = "chat_message"
partition = 0
timeout = 1

[staticSrcConfig]
staticAvatarPath = "./static/avatars"
staticFilePath = "./static/files"

[email]
smtp_host = "smtp.gmail.com"
smtp_port = 465
username = "your-email@gmail.com"
password = "your-smtp-authorization-code"

[securityConfig]
# 允许跨域的前端来源列表，多个用逗号分隔
allowedOrigins = ["http://localhost:5173", "http://127.0.0.1:5173"]
# JWT 签名密钥，部署前请替换为随机强密钥
jwtSecret = "change-this-to-a-random-strong-secret-before-deploy"
jwtIssuer = "chatapp"
# TURN 服务器（WebRTC 中继），留空则不提供 TURN 凭证
turnServer = "your-turn-server:3478"
turnSecret = "your-turn-static-auth-secret"


