

[mainConfig]
appName = "gochat"
host = "127.0.0.1"
port = 8000

[mysqlConfig]
host = "127.0.0.1"
port = 3307
user = "root"
password = "123456"
databaseName = "gochat"

[redisConfig]
host = "127.0.0.1"
port = 6379
password = "123456"
db = 0

[authCodeConfig]
accessKeyID = "your accessKeyID in alibaba cloud"
accessKeySecret = "your accessKeySecret in alibaba cloud"
signName = "阿里云短信测试"
templateCode = "SMS_154950909"

[logConfig]
# 日志文件路径，留空则只写 stdout
logPath = "./logs/gochat.log"
# 单个日志文件最大 MB，超出则轮转
maxSizeMB = 50
# 保留最近几天的旧日志
maxAgeDays = 7
# 最多保留几个旧日志文件
maxBackups = 3

[kafkaConfig]
messageMode = "channel"
hostPort = "127.0.0.1:9092"
chatTopic = "chat.message"
partition = 0
timeout = 1

[staticSrcConfig]
staticAvatarPath = "./static/avatars"
staticFilePath = "./static/files"

[email]
smtp_host = "smtp.gmail.com"
smtp_port = 465
username = "your-email@gmail.com"
password = "your-smtp-authorization-code"

[adminConfig]
# 管理员账号，部署时由脚本替换；本地留占位符则跳过自动创建
username = "ADMIN_USERNAME_PLACEHOLDER"
# 管理员密码（明文，启动时自动 bcrypt 哈希存储），部署时由脚本替换
password = "ADMIN_PASSWORD_PLACEHOLDER"

[securityConfig]
# 允许跨域的前端来源列表，多个用逗号分隔
# 留空则退回 * (开发模式)；生产部署时由脚本替换为实际域名，如 ["https://www.example.com"]
allowedOrigins = []
# JWT 签名密钥，部署前请替换为随机强密钥
jwtSecret = "change-this-to-a-random-strong-secret-before-deploy"
jwtIssuer = "chatapp"
# TURN 服务器（WebRTC 中继），留空则不提供 TURN 凭证
turnServer = "your-turn-server:3478"
turnSecret = "your-turn-static-auth-secret"


