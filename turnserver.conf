# ============================================================
# coturn 配置文件（VPS: 209.54.106.103）
# 保存为 /etc/turnserver.conf
# ============================================================

# 监听端口
listening-port=3478
tls-listening-port=5349

# 绑定的公网IP（VPS的公网IP）
listening-ip=209.54.106.103
external-ip=209.54.106.103

# Relay 端口范围（确保防火墙放开这些端口）
min-port=49152
max-port=65535

# ✅ 启用时效性动态凭证（与后端 HMAC-SHA1 配对）
use-auth-secret
static-auth-secret=gochat_turn_secret_2024

# Realm（可以是你的域名）
realm=ttboyi.dpdns.org

# 日志
log-file=/var/log/turnserver.log
verbose

# 安全：不允许 loopback/私有地址中继（防止 SSRF）
no-loopback-peers
no-multicast-peers

# 心跳
stale-nonce=600

# TLS 证书（如有SSL证书可启用，否则注释掉）
# cert=/etc/letsencrypt/live/ttboyi.dpdns.org/fullchain.pem
# pkey=/etc/letsencrypt/live/ttboyi.dpdns.org/privkey.pem
